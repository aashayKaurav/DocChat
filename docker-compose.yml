services:
    postgres:
      image: postgres:16-alpine
      container_name: docchat-postgres
      environment:
        POSTGRES_DB: docchat
        POSTGRES_USER: docchat
        POSTGRES_PASSWORD: docchat123
      ports:
        - "5434:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

    kafka:
      image: apache/kafka:3.7.0
      container_name: docchat-kafka
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        CLUSTER_ID: docchat-kafka-cluster-id-01
      ports:
        - "9092:9092"
      volumes:
        - kafka_data:/var/lib/kafka/data

    qdrant:
      image: qdrant/qdrant:v1.9.7
      container_name: docchat-qdrant
      ports:
        - "6333:6333"
        - "6334:6334"
      volumes:
        - qdrant_data:/qdrant/storage

    ollama:
      image: ollama/ollama:latest
      container_name: docchat-ollama
      environment:
        OLLAMA_INSECURE: "true"
      ports:
        - "11434:11434"
      volumes:
        - ollama_data:/root/.ollama

volumes:
    postgres_data:
    kafka_data:
    qdrant_data:
    ollama_data: